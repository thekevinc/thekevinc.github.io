<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kevin c</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="content">
    <div class="hero">
      <h1>kevin c</h1>
      <a href="https://whalewatch.win/" target="_blank" rel="noreferrer"
         class="bubble bubble-a">🐋 Whale Watch</a>
      <a href="https://rent.rorqual.xyz/" target="_blank" rel="noreferrer"
         class="bubble bubble-b">🏠 Mortgage vs Rent</a>
      <a href="https://soundcloud.com/thekevinc" target="_blank" rel="noreferrer"
         class="bubble bubble-c">🎵 SoundCloud</a>
    </div>
  </div>

  <div class="nowplaying" id="nowplaying">
    <div class="np-disc"></div>
    <div class="np-text">
      <span class="np-label">Now Playing</span>
      <span class="np-title"><span class="artist">Martin Jarl —</span> Zoologiska</span>
    </div>
    <button class="np-btn" id="npBtn" aria-label="Play/pause">
      <svg id="npIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

  <div class="start-overlay" id="startOverlay">
    <div class="play-icon"></div>
    <div class="start-label">Click anywhere to begin</div>
  </div>

  <audio id="audio" src="zoologiska.mp3" preload="auto" loop crossorigin="anonymous"></audio>

  <div id="debug-harm" style="
    position:fixed; top:1rem; right:1rem; z-index:200;
    background:rgba(10,12,16,0.88); border:1px solid rgba(255,255,255,0.12);
    border-radius:10px; padding:0.75rem 1rem; font:11px/1.8 monospace;
    color:rgba(255,255,255,0.7); width:220px;
  ">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">
      <span style="font-weight:600;color:#fff">Harmonic color</span>
      <button id="btn-preset" style="font:10px monospace;padding:0.15rem 0.4rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:rgba(255,255,255,0.6);cursor:pointer">↺ martin-jarl</button>
    </div>
    <label>Rotation <span id="v-hrot">2.20</span>
      <input id="s-hrot" type="range" min="0" max="6.28" step="0.05" value="2.2" style="width:100%">
    </label>
    <label>Sens low <span id="v-hslo">0.030</span>
      <input id="s-hslo" type="range" min="0" max="0.3" step="0.005" value="0.03" style="width:100%">
    </label>
    <label>Sens high <span id="v-hshi">0.100</span>
      <input id="s-hshi" type="range" min="0.01" max="0.5" step="0.005" value="0.10" style="width:100%">
    </label>
    <label>Saturation <span id="v-hsat">0.65</span>
      <input id="s-hsat" type="range" min="0" max="2.0" step="0.05" value="0.65" style="width:100%">
    </label>
    <label>Lag (→ slower) <span id="v-hsmo">1.00</span>
      <input id="s-hsmo" type="range" min="0.0" max="1.0" step="0.01" value="1.00" style="width:100%">
    </label>
    <div style="margin-top:0.4rem;color:rgba(255,255,255,0.35);font-size:10px">
      chroma magnitude: <span id="v-hmag">0.000</span><br>
      hue angle: <span id="v-hang">0.00</span> rad
    </div>
    <div style="font-weight:600;margin:0.7rem 0 0.4rem;color:#fff;border-top:1px solid rgba(255,255,255,0.1);padding-top:0.6rem">Hi-hat flash</div>
    <label>Strength (0=off) <span id="v-tstr">0.00</span>
      <input id="s-tstr" type="range" min="0" max="1.0" step="0.05" value="0" style="width:100%">
    </label>
    <div style="margin-top:0.3rem;color:rgba(255,255,255,0.35);font-size:10px">
      transient level: <span id="v-tlvl">0.000</span>
    </div>
  </div>

  <script type="module" src="visualizer.js"></script>
</body>
</html>
